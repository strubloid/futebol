<section class="filters-bar" aria-label="Channel filters">
  <label class="search-field">
    <span class="prompt">$</span>
    <input
      type="search"
      placeholder="grep channels..."
      [ngModel]="filters().searchTerm"
      (ngModelChange)="updateSearchTerm($event)"
    />
  </label>

  <label class="filter-item">
    <span class="filter-label">playlist</span>
    <select [ngModel]="filters().playlistId" (ngModelChange)="updatePlaylist($event)">
      <option value="all">*</option>
      @for (playlist of playlists(); track playlist.id) {
        <option [value]="playlist.id">{{ playlist.name }}</option>
      }
    </select>
  </label>

  <label class="filter-item checkbox">
    <input
      type="checkbox"
      [ngModel]="filters().favoritesOnly"
      (ngModelChange)="updateFavoritesOnly($event)"
    />
    <span class="check-label">♥ faves</span>
  </label>

  <label class="filter-item checkbox">
    <input
      type="checkbox"
      [ngModel]="filters().showNonWorking"
      (ngModelChange)="updateShowNonWorking($event)"
    />
    <span class="check-label">✗ broken</span>
  </label>
</section>
