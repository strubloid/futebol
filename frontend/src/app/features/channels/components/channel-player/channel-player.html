<div class="player-overlay" [class.fullscreen]="isFullscreen">
  <!-- Top bar -->
  <div class="player-topbar">
    <button type="button" class="close-btn" (click)="closePlayer()" aria-label="Close player">
      ✕
    </button>
    <div class="channel-id">
      <span class="prompt">▶</span>
      <span class="name">{{ channel()?.name }}</span>
    </div>
    <button type="button" class="fs-btn" (click)="toggleFullscreen()" aria-label="Toggle fullscreen">
      {{ isFullscreen ? '⊞' : '⛶' }}
    </button>
  </div>

  <!-- Video area -->
  <div class="player-viewport">
    <video #videoElement muted playsinline></video>

    @if (!ready()) {
      <div class="loading-overlay">
        <span class="loading-text">$ connecting...</span>
        <span class="loading-bar"></span>
      </div>
    }
  </div>

  <!-- Bottom info -->
  <div class="player-bottombar">
    <span class="source">{{ channel()?.sourcePlaylistName }}</span>
    <span class="url-hint">
      <a [href]="channel()?.streamUrl" target="_blank" rel="noreferrer">[stream]</a>
    </span>
  </div>
</div>
