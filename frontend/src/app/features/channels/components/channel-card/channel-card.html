<button
  type="button"
  class="channel-card"
  [class.selected]="isSelected()"
  (click)="channelSelected.emit(channel())"
>
  <span class="logo-frame">
    @if (channel().logoUrl) {
      <img [src]="channel().logoUrl" [alt]="channel().name + ' logo'" loading="lazy" />
    } @else {
      <span>{{ channel().name.slice(0, 2).toUpperCase() }}</span>
    }
  </span>

  <span class="channel-copy">
    <strong>{{ channel().name }}</strong>
    <small>{{ channel().groupTitle }} · {{ channel().sourcePlaylistName }}</small>
  </span>
</button>
