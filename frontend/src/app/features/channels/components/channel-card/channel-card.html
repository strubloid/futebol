<button
  type="button"
  class="channel-card"
  [class.favorite]="isFavorite()"
  [class.premium]="!channel().isFree"
  (click)="channelSelected.emit(channel())"
>
  <div class="card-poster">
    @if (channel().logoUrl) {
      <img [src]="channel().logoUrl" [alt]="channel().name" loading="lazy" />
    } @else {
      <span class="fallback-icon">{{ channel().name.slice(0, 2).toUpperCase() }}</span>
    }
    <div class="card-overlay">
      <span class="play-indicator">▶</span>
    </div>
  </div>

  <div class="card-info">
    <strong class="card-name">{{ channel().name }}</strong>
    <span class="card-meta">
      {{ channel().sourcePlaylistName }}
      @if (!channel().isFree) {
        <span class="card-premium">🔒</span>
      }
    </span>
  </div>

  <div class="card-actions">
    <button
      type="button"
      class="epg-btn"
      (click)="$event.stopPropagation(); showEpg.emit(channel())"
      title="Programação de TV"
      aria-label="Ver programação"
    >
      📋
    </button>
    <button
      type="button"
      class="fave-btn"
      [class.active]="isFavorite()"
      (click)="$event.stopPropagation(); favoriteToggled.emit(channel())"
      [attr.aria-label]="isFavorite() ? 'Unfavorite' : 'Favorite'"
    >♥</button>
  </div>
</button>
